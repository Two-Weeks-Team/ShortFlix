# Cloud Run: shortflix-search (Python ADK)
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: shortflix-search
  labels:
    app: shortflix
    tier: agent
    role: search
  annotations:
    run.googleapis.com/ingress: internal
    run.googleapis.com/description: "Search agent — real-time RapidAPI-backed cross-platform search."
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      serviceAccountName: sa-search@PROJECT_ID.iam.gserviceaccount.com
      containerConcurrency: 20
      timeoutSeconds: 60
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/shortflix-images/shortflix-search:latest
          ports:
            - name: http1
              containerPort: 8083
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: AGENT_NAME
              value: search
            - name: VERTEX_PROJECT
              value: PROJECT_ID
            - name: VERTEX_LOCATION
              value: us-central1
            - name: MCP_YT_URL
              value: https://shortflix-mcp-yt-PROJECT_NUMBER.REGION.run.app
            - name: MCP_IG_URL
              value: https://shortflix-mcp-ig-PROJECT_NUMBER.REGION.run.app
            - name: MCP_TT_URL
              value: https://shortflix-mcp-tt-PROJECT_NUMBER.REGION.run.app
            - name: OTEL_SERVICE_NAME
              value: search
          startupProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
  traffic:
    - percent: 100
      latestRevision: true
