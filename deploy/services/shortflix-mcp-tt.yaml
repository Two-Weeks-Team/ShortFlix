# Cloud Run: shortflix-mcp-tt (TikTok via RapidAPI)
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: shortflix-mcp-tt
  labels:
    app: shortflix
    tier: mcp
    platform: tiktok
  annotations:
    run.googleapis.com/ingress: internal
    run.googleapis.com/description: "MCP server — TikTok via RapidAPI. Egress: *.rapidapi.com only."
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/vpc-access-connector: projects/PROJECT_ID/locations/REGION/connectors/shortflix-egress
        run.googleapis.com/vpc-access-egress: all-traffic
    spec:
      serviceAccountName: sa-mcp-tt@PROJECT_ID.iam.gserviceaccount.com
      containerConcurrency: 40
      timeoutSeconds: 60
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/shortflix-images/shortflix-mcp-tt:latest
          ports:
            - name: http1
              containerPort: 8092
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: MCP_NAME
              value: mcp-tt
            - name: RAPIDAPI_HOST
              value: tiktok-scraper7.p.rapidapi.com
            - name: PLATFORM
              value: tiktok
          startupProbe:
            httpGet:
              path: /health
              port: 8092
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
  traffic:
    - percent: 100
      latestRevision: true
