# Cloud Run: shortflix-web (Next.js 14 PWA)
# Profile: latency-critical → min-instances=1 (cold-start would hurt MD-05's 8s opening shot)
# Memory: 512Mi · CPU: 1 (Next standalone is light at runtime)
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: shortflix-web
  labels:
    app: shortflix
    tier: edge
    role: pwa
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/description: "ShortFlix PWA — Next.js App Router. Daily 9-card discovery surface."
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      serviceAccountName: sa-web@PROJECT_ID.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/shortflix-images/shortflix-web:latest
          ports:
            - name: http1
              containerPort: 3000
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_API_BASE_URL
              value: https://shortflix-api-PROJECT_NUMBER.REGION.run.app
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
  traffic:
    - percent: 100
      latestRevision: true
