# Cloud Run: shortflix-trend-safety (Python ADK)
# Vertex AI invoker (calls Gemini via google-cloud-aiplatform for moderation/trend signals)
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: shortflix-trend-safety
  labels:
    app: shortflix
    tier: agent
    role: trend-safety
  annotations:
    run.googleapis.com/ingress: internal
    run.googleapis.com/description: "Trend & Safety agent — moderation + trend scoring via Vertex AI Gemini."
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      serviceAccountName: sa-trend-safety@PROJECT_ID.iam.gserviceaccount.com
      containerConcurrency: 10
      timeoutSeconds: 120
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/shortflix-images/shortflix-trend-safety:latest
          ports:
            - name: http1
              containerPort: 8084
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
          env:
            - name: AGENT_NAME
              value: trend-safety
            - name: VERTEX_PROJECT
              value: PROJECT_ID
            - name: VERTEX_LOCATION
              value: us-central1
            - name: GEMINI_MODEL
              value: gemini-2.5-flash
            - name: OTEL_SERVICE_NAME
              value: trend-safety
          startupProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
  traffic:
    - percent: 100
      latestRevision: true
