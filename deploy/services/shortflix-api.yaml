# Cloud Run: shortflix-api (NestJS gateway)
# Profile: scale-to-zero (PWA caches; cold start tolerable for non-first-paint)
# Memory: 512Mi · CPU: 1 · concurrency: 80
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: shortflix-api
  labels:
    app: shortflix
    tier: gateway
    role: api
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/description: "NestJS gateway. Routes PWA → ADK agents via A2A HTTP."
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      serviceAccountName: sa-api@PROJECT_ID.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/shortflix-images/shortflix-api:latest
          ports:
            - name: http1
              containerPort: 3001
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: ORCHESTRATOR_URL
              value: https://shortflix-orchestrator-PROJECT_NUMBER.REGION.run.app
            - name: FIRESTORE_PROJECT_ID
              value: PROJECT_ID
          envFrom: []
          # Secret Manager refs (do NOT commit values)
          # Mounted via env at deploy time: --set-secrets is the gcloud-side equivalent
          # See deploy/iam.yaml for the SA binding.
          startupProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
  traffic:
    - percent: 100
      latestRevision: true
